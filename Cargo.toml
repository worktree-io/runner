[package]
name = "worktree-io"
version = "0.7.2"
edition = "2021"
description = "A CLI tool to open GitHub issues as git worktree workspaces"
license = "MIT"
repository = "https://github.com/worktree-io/runner"
keywords = ["worktree", "github", "issues", "cli", "git"]
categories = ["command-line-utilities", "development-tools"]

[lib]
name = "worktree_io"
path = "src/lib.rs"

[[bin]]
name = "worktree"
path = "src/main.rs"

[dev-dependencies]
cargo-husky = { version = "1", default-features = false, features = ["user-hooks"] }

[dependencies]
clap    = { version = "4", features = ["derive"] }
serde   = { version = "1", features = ["derive"] }
toml    = "0.8"
anyhow  = "1"
url     = "2"
dirs    = "5"
uuid    = "1"

[lints.rust]
unsafe_code = "forbid"
missing_docs = "deny"

[lints.clippy]
pedantic = { level = "deny", priority = -1 }
nursery = { level = "deny", priority = -1 }
cargo = { level = "deny", priority = -1 }
# Cannot control transitive dependency version conflicts
multiple_crate_versions = "allow"
